version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    container_name: reactive-redis-poc
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: redis-insight
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
